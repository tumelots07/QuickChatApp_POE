name: Java CI with Maven

on:
  push:
    branches:
      - main
      - part-2-messaging
      - part-3-final

  pull_request:
    branches:
      - main
      - part-2-messaging
      - part-3-final

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        working-directory: QuickChatApp
        run: mvn clean test
